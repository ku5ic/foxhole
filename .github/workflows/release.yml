name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Upgrade npm for OIDC publishing support
        run: npm install -g npm@latest

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NODE_AUTH_TOKEN is intentionally absent. npm uses OIDC via id-token: write
          # combined with the trusted publisher configured on npmjs.com. Setting it to
          # any value would override OIDC with token auth and break the publish step.
          # See RELEASING.md for the one-time npmjs.com setup required before this works.
