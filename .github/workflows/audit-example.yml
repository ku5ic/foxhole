name: Audit example

# A red build is the feature. This workflow proves the published tarball
# produces a non-zero exit when the site score drops below --threshold.
# To demo the gate: raise --threshold in the "Run audit" step above the
# actual score (~82 for example.com). The build goes red. That is the point.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run clean
      - run: npm run build

      - name: Pack and install globally
        run: |
          npm pack
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          npm install -g "ku5ic-foxhole-${VERSION}.tgz"

      - name: Install Chromium for global foxhole
        run: $(npm root -g)/@ku5ic/foxhole/node_modules/.bin/playwright install chromium

      - name: Install Chromium system dependencies
        run: $(npm root -g)/@ku5ic/foxhole/node_modules/.bin/playwright install-deps chromium

      - name: Run audit
        # Default threshold is 80. Raise it above ~82 to force exit 1 and demo the gate.
        run: foxhole run --url https://example.com --output json --out audit.json --threshold 80

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report
          path: audit.json
